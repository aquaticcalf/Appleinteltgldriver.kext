name: Xcode Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel Extension
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build Kext
      run: |
        xcodebuild clean build \
          -project AppleIntelTGLController.xcodeproj \
          -scheme AppleIntelTGLController \
          -configuration Release \
          SYMROOT=build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          WARNING_CFLAGS="-Wno-deprecated-declarations -Wno-macro-redefined -Wno-shorten-64-to-32"

    - name: Package Kext
      run: |
        cd build/Release
        zip -r AppleIntelTGLController.kext.zip AppleIntelTGLController.kext

    - name: Upload Kext Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppleIntelTGLController-Release
        path: build/Release/AppleIntelTGLController.kext.zip
        retention-days: 90
